name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  XCODE_PROJECT: JammLab.xcodeproj
  XCODE_SCHEME: JammLab
  XCODE_DESTINATION: platform=macOS,arch=arm64
  DERIVED_DATA_PATH: build-ci
  SKIP_BUNDLED_SEPARATOR_HELPER: "1"

jobs:
  python-tests:
    name: Python Helper Tests
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Python helper tests
        run: python3 -m unittest JammLabSeparatorHelper/test_runner.py

  swift-tests:
    name: Swift Tests
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Swift tests
        run: >
          xcodebuild test
          -project "$XCODE_PROJECT"
          -scheme "$XCODE_SCHEME"
          -destination "$XCODE_DESTINATION"
          -derivedDataPath "$DERIVED_DATA_PATH"
          CODE_SIGN_IDENTITY=-
          CODE_SIGN_STYLE=Manual
          DEVELOPMENT_TEAM=
          PROVISIONING_PROFILE_SPECIFIER=
          ONLY_ACTIVE_ARCH=YES
          ARCHS=arm64

  build-smoke:
    name: Unsigned Build Smoke (${{ matrix.configuration }})
    runs-on: macos-26
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Debug
          - Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build unsigned app
        run: >
          xcodebuild build
          -project "$XCODE_PROJECT"
          -scheme "$XCODE_SCHEME"
          -configuration "${{ matrix.configuration }}"
          -destination "$XCODE_DESTINATION"
          -derivedDataPath "$DERIVED_DATA_PATH"
          CODE_SIGN_IDENTITY=-
          CODE_SIGN_STYLE=Manual
          DEVELOPMENT_TEAM=
          PROVISIONING_PROFILE_SPECIFIER=
          ONLY_ACTIVE_ARCH=YES
          ARCHS=arm64

  release-artifacts:
    name: Tag Release Artifacts
    runs-on: macos-26
    needs:
      - python-tests
      - swift-tests
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      SKIP_BUNDLED_SEPARATOR_HELPER: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive release version from tag
        run: |
          set -euo pipefail
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must match vMAJOR.MINOR.PATCH, got: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Cache bundled separator helper dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/JammLabSeparatorHelper/venv
            build/JammLabSeparatorHelper/model-cache
            build/JammLabSeparatorHelper/pyinstaller-config
          key: separator-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('JammLabSeparatorHelper/requirements.txt', 'JammLabSeparatorHelper/runner.py', 'JammLabSeparatorHelper/JammLabSeparatorHelper.spec', 'scripts/build_separator_helper.sh') }}
          restore-keys: |
            separator-${{ runner.os }}-${{ runner.arch }}-

      - name: Build bundled separator helper
        run: scripts/build_separator_helper.sh

      - name: Build unsigned release app
        run: >
          xcodebuild build
          -project "$XCODE_PROJECT"
          -scheme "$XCODE_SCHEME"
          -configuration Release
          -destination "$XCODE_DESTINATION"
          -derivedDataPath "$DERIVED_DATA_PATH"
          CODE_SIGN_IDENTITY=-
          CODE_SIGN_STYLE=Manual
          DEVELOPMENT_TEAM=
          PROVISIONING_PROFILE_SPECIFIER=
          MARKETING_VERSION="$RELEASE_VERSION"
          CURRENT_PROJECT_VERSION="${{ github.run_number }}"
          ONLY_ACTIVE_ARCH=YES
          ARCHS=arm64

      - name: Package unsigned DMG
        run: >
          scripts/package_dmg.sh
          "$DERIVED_DATA_PATH/Build/Products/Release/JammLab.app"
          "dist/JammLab-$RELEASE_VERSION-unsigned.dmg"

      - name: Package source archive
        run: |
          set -euo pipefail
          mkdir -p dist
          git archive --format=zip --output "dist/JammLab-$RELEASE_VERSION-source.zip" "$GITHUB_REF_NAME"

      - name: Upload unsigned DMG
        uses: actions/upload-artifact@v4
        with:
          name: JammLab-${{ env.RELEASE_VERSION }}-unsigned-dmg
          path: dist/JammLab-${{ env.RELEASE_VERSION }}-unsigned.dmg
          if-no-files-found: error

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: JammLab-${{ env.RELEASE_VERSION }}-source
          path: dist/JammLab-${{ env.RELEASE_VERSION }}-source.zip
          if-no-files-found: error
