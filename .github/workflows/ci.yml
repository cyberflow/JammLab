name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  XCODE_PROJECT: JammLab.xcodeproj
  XCODE_SCHEME: JammLab
  XCODE_DESTINATION: platform=macOS,arch=arm64
  DERIVED_DATA_PATH: build-ci
  SKIP_BUNDLED_SEPARATOR_HELPER: "1"

jobs:
  python-tests:
    name: Python Helper Tests
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Python helper tests
        run: python3 -m unittest JammLabSeparatorHelper/test_runner.py

  swift-tests:
    name: Swift Tests
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Swift tests
        run: >
          xcodebuild test
          -project "$XCODE_PROJECT"
          -scheme "$XCODE_SCHEME"
          -destination "$XCODE_DESTINATION"
          -derivedDataPath "$DERIVED_DATA_PATH"
          CODE_SIGN_IDENTITY=-
          CODE_SIGN_STYLE=Manual
          DEVELOPMENT_TEAM=
          PROVISIONING_PROFILE_SPECIFIER=
          ONLY_ACTIVE_ARCH=YES
          ARCHS=arm64

  build-smoke:
    name: Unsigned Build Smoke (${{ matrix.configuration }})
    runs-on: macos-26
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Debug
          - Release
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build unsigned app
        run: >
          xcodebuild build
          -project "$XCODE_PROJECT"
          -scheme "$XCODE_SCHEME"
          -configuration "${{ matrix.configuration }}"
          -destination "$XCODE_DESTINATION"
          -derivedDataPath "$DERIVED_DATA_PATH"
          CODE_SIGN_IDENTITY=-
          CODE_SIGN_STYLE=Manual
          DEVELOPMENT_TEAM=
          PROVISIONING_PROFILE_SPECIFIER=
          ONLY_ACTIVE_ARCH=YES
          ARCHS=arm64

  tag-artifacts:
    name: Tag Build Artifacts
    runs-on: macos-26
    needs:
      - python-tests
      - swift-tests
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      release_version: ${{ steps.release_metadata.outputs.RELEASE_VERSION }}
      app_version: ${{ steps.release_metadata.outputs.APP_VERSION }}
      release_channel: ${{ steps.release_metadata.outputs.RELEASE_CHANNEL }}
      is_github_release: ${{ steps.release_metadata.outputs.IS_GITHUB_RELEASE }}
      is_prerelease: ${{ steps.release_metadata.outputs.IS_PRERELEASE }}
    env:
      SKIP_BUNDLED_SEPARATOR_HELPER: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Derive release metadata from tag
        id: release_metadata
        run: |
          set -euo pipefail
          metadata="$(scripts/derive_release_metadata.sh "$GITHUB_REF_NAME")"
          printf '%s\n' "$metadata"
          printf '%s\n' "$metadata" >> "$GITHUB_ENV"
          printf '%s\n' "$metadata" >> "$GITHUB_OUTPUT"

      - name: Cache bundled separator helper dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/JammLabSeparatorHelper/venv
            build/JammLabSeparatorHelper/model-cache
            build/JammLabSeparatorHelper/pyinstaller-config
          key: separator-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('JammLabSeparatorHelper/requirements.txt', 'JammLabSeparatorHelper/runner.py', 'JammLabSeparatorHelper/JammLabSeparatorHelper.spec', 'scripts/build_separator_helper.sh') }}
          restore-keys: |
            separator-${{ runner.os }}-${{ runner.arch }}-

      - name: Build bundled separator helper
        run: scripts/build_separator_helper.sh

      - name: Build unsigned release app
        run: >
          xcodebuild build
          -project "$XCODE_PROJECT"
          -scheme "$XCODE_SCHEME"
          -configuration Release
          -destination "$XCODE_DESTINATION"
          -derivedDataPath "$DERIVED_DATA_PATH"
          CODE_SIGN_IDENTITY=-
          CODE_SIGN_STYLE=Manual
          DEVELOPMENT_TEAM=
          PROVISIONING_PROFILE_SPECIFIER=
          MARKETING_VERSION="$APP_VERSION"
          CURRENT_PROJECT_VERSION="${{ github.run_number }}"
          ONLY_ACTIVE_ARCH=YES
          ARCHS=arm64

      - name: Package unsigned DMG
        run: >
          scripts/package_dmg.sh
          "$DERIVED_DATA_PATH/Build/Products/Release/JammLab.app"
          "dist/JammLab-$RELEASE_VERSION-unsigned.dmg"

      - name: Package source archive
        run: |
          set -euo pipefail
          mkdir -p dist
          git archive --format=zip --output "dist/JammLab-$RELEASE_VERSION-source.zip" "$GITHUB_REF_NAME"

      - name: Upload unsigned DMG
        uses: actions/upload-artifact@v4
        with:
          name: JammLab-${{ steps.release_metadata.outputs.RELEASE_VERSION }}-unsigned-dmg
          path: dist/JammLab-${{ steps.release_metadata.outputs.RELEASE_VERSION }}-unsigned.dmg
          if-no-files-found: error

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: JammLab-${{ steps.release_metadata.outputs.RELEASE_VERSION }}-source
          path: dist/JammLab-${{ steps.release_metadata.outputs.RELEASE_VERSION }}-source.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - tag-artifacts
    if: startsWith(github.ref, 'refs/tags/v') && needs.tag-artifacts.outputs.is_github_release == 'true'
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ needs.tag-artifacts.outputs.release_version }}
      IS_PRERELEASE: ${{ needs.tag-artifacts.outputs.is_prerelease }}
    steps:
      - name: Download unsigned DMG
        uses: actions/download-artifact@v4
        with:
          name: JammLab-${{ needs.tag-artifacts.outputs.release_version }}-unsigned-dmg
          path: dist

      - name: Download source archive
        uses: actions/download-artifact@v4
        with:
          name: JammLab-${{ needs.tag-artifacts.outputs.release_version }}-source
          path: dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY:?}"
          DMG_ASSET="dist/JammLab-$RELEASE_VERSION-unsigned.dmg"
          SOURCE_ASSET="dist/JammLab-$RELEASE_VERSION-source.zip"

          test -f "$DMG_ASSET"
          test -f "$SOURCE_ASSET"

          if gh release view "$GITHUB_REF_NAME" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$DMG_ASSET" "$SOURCE_ASSET" --repo "$REPO" --clobber
          elif [[ "$IS_PRERELEASE" == "true" ]]; then
            gh release create "$GITHUB_REF_NAME" "$DMG_ASSET" "$SOURCE_ASSET" --repo "$REPO" --verify-tag --generate-notes --prerelease --latest=false
          else
            gh release create "$GITHUB_REF_NAME" "$DMG_ASSET" "$SOURCE_ASSET" --repo "$REPO" --verify-tag --generate-notes --latest
          fi
